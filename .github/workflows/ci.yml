name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile builder script
        run: python -m py_compile builder_signal.py
      - name: Run smoke test
        run: python tests/test_smoke.py
